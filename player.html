<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<div class="max-w-5xl mx-auto px-4 py-6">

    <button id="backBtn" class="mb-4 text-sm text-gray-400 hover:text-white">← Kembali</button>

    <!-- Player -->
    <div class="relative w-full bg-black rounded-xl overflow-hidden" style="aspect-ratio:16/9">
        <div id="playerPlaceholder" class="absolute inset-0 flex items-center justify-center text-gray-500">
            <span>Pilih sumber di bawah</span>
        </div>
        <iframe id="videoFrame" class="absolute inset-0 w-full h-full hidden" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <!-- Info -->
    <div class="mt-4 flex gap-4">
        <img id="poster" class="w-32 rounded-lg object-cover shrink-0" src="" onerror="this.style.display='none'">
        <div class="flex-1">
            <h1 id="title" class="text-xl font-bold"></h1>
            <p id="meta" class="text-sm text-gray-400 mt-1"></p>
            <p id="description" class="text-sm text-gray-300 mt-2 line-clamp-3"></p>
            <div id="categories" class="flex flex-wrap gap-2 mt-3"></div>

            <!-- Download hint -->
            <div class="mt-3 flex flex-wrap items-center gap-2">
                <a id="openEmbedBtn" href="#" target="_blank"
                   class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-300 flex items-center gap-2">
                    ↗ Buka Player di Tab Baru
                </a>
                <span class="text-xs text-gray-600">pakai ekstensi browser untuk download (Video DownloadHelper, dll)</span>
            </div>
        </div>
    </div>

    <!-- Episodes & Sources -->
    <div id="episodeSection" class="mt-6"></div>

</div>

<script>
    const PROXY = 'https://coba-railway-production.up.railway.app/api';

    const params = new URLSearchParams(location.search);
    const slug = params.get('slug');

    if (!slug) {
        document.body.innerHTML = '<div class="p-10 text-center text-red-400">Slug tidak ditemukan. Akses via ?slug=movie-slug</div>';
    } else {
        loadMovie(slug);
    }

    document.getElementById('backBtn').addEventListener('click', () => history.back());

    async function loadMovie(slug) {
        try {
            const res = await fetch(`${PROXY_URL}/movies/${slug}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            render(json.data);
        } catch (err) {
            document.body.innerHTML = `<div class="p-10 text-center text-red-400">Gagal load: ${err.message}</div>`;
        }
    }

    function render(d) {
        document.title = d.title;
        document.getElementById('title').innerText = d.title;
        document.getElementById('poster').src = d.poster_url || d.thumbnail_url || '';
        document.getElementById('description').innerText = d.description || '';
        document.getElementById('meta').innerText = [
            d.duration ? `⏱ ${d.duration}` : '',
            d.quality  ? `🎬 ${d.quality}`  : '',
            d.views    ? `👁 ${d.views.toLocaleString()} views` : '',
        ].filter(Boolean).join('  ·  ');

        // Categories
        const catDiv = document.getElementById('categories');
        (d.categories || []).forEach(c => {
            const span = document.createElement('span');
            span.className = 'px-2 py-0.5 bg-gray-800 rounded-full text-xs text-gray-300';
            span.innerText = c.name;
            catDiv.appendChild(span);
        });

        // Episodes & Sources
        const epSection = document.getElementById('episodeSection');
        epSection.innerHTML = '';
        let firstSource = null;

        (d.episodes || []).forEach(ep => {
            const epDiv = document.createElement('div');
            epDiv.className = 'mb-4';
            epDiv.innerHTML = `<h3 class="text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Episode: ${ep.name}</h3>`;

            const btnRow = document.createElement('div');
            btnRow.className = 'flex flex-wrap gap-2';

            (ep.sources || []).forEach((src, i) => {
                if (!firstSource) firstSource = src;

                const btn = document.createElement('button');
                btn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-gray-800 hover:bg-indigo-600 transition source-btn';
                btn.innerText = src.server_name || `Server ${i + 1}`;
                btn.dataset.embed = src.embed_url || '';
                btn.addEventListener('click', () => {
                    playEmbed(src.embed_url);
                    document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('bg-indigo-600'));
                    btn.classList.add('bg-indigo-600');
                });

                btnRow.appendChild(btn);
            });

            epDiv.appendChild(btnRow);
            epSection.appendChild(epDiv);
        });

        // Auto-play source pertama
        if (firstSource?.embed_url) {
            playEmbed(firstSource.embed_url);
            setTimeout(() => {
                const first = document.querySelector('.source-btn');
                if (first) first.classList.add('bg-indigo-600');
            }, 0);
        }
    }

    function playEmbed(url) {
        if (!url) return;
        const frame = document.getElementById('videoFrame');
        const placeholder = document.getElementById('playerPlaceholder');
        frame.src = url;
        frame.classList.remove('hidden');
        placeholder.classList.add('hidden');

        const openBtn = document.getElementById('openEmbedBtn');
        if (openBtn) openBtn.href = url;
    }
</script>
</body>
</html>
